server:
  port: 9090
  servlet:
    context-path: /api/ragent

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.nageoffer.ai.ragent
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema_pg.sql

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: 123456
    url: jdbc:postgresql://127.0.0.1:5432/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

rag:
  vector:
    type: pg  # 可选 milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE

  query-rewrite:
    enabled: true
    max-history-messages: 4
    max-history-chars: 500

  retrieval:
    top-k: 5

  memory:
    window-size: 10
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30

  intent:
    confidence-threshold: 0.5

  rewrite:
    prompt: |
      你是一个查询改写助手。根据以下对话历史和用户最新问题，将用户问题改写为一个独立、完整、清晰的检索查询。
      要求：
      1. 保留用户原始意图
      2. 补全省略的指代（如"它"、"这个"等）
      3. 去除与检索无关的客套语
      4. 只输出改写后的查询，不要解释
      对话历史：
      {history}
      用户问题：{question}
      改写后的查询：

  rate-limit:
    global:
      enabled: true
      max-concurrent: 50
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /api/chat
        embedding: /api/embed
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: sk-iaksdylhvxitcrjxwstoxehgwtsktchkxfcrxqhxteujrtuo
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: deepseek-v3
    deep-thinking-model: deepseek-v3
    candidates:
      - id: deepseek-v3
        provider: siliconflow
        model: DeepSeek/DeepSeek-V3
        supports-thinking: true
        priority: 1
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 0

  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: ${rag.default.dimension}
        priority: 1

  rerank:
    default-model: rerank-noop
    candidates:
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 1

  circuit-breaker:
    failure-threshold: 5
    cool-down-seconds: 60
    probe-timeout-seconds: 30

minio:
  url: http://localhost:9000
  access-key-id: minioadmin
  secret-access-key: minioadmin
  bucket-name: ragent

redisson:
  single-server-config:
    address: redis://127.0.0.1:6379
    connection-pool-size: 16
    connection-minimum-idle-size: 4
    idle-connection-timeout: 10000
    connect-timeout: 10000
    timeout: 3000

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false
  jwt-secret-key: ragent-jwt-secret-key-please-change-in-production

app:
  demo-mode: false
